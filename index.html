<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0e1a">
<title>Mirage — the world's digital layer</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    --ink: #0b0e1a;          /* deep night indigo */
    --mist: #f2efe6;         /* paper white */
    --gold: #e8b44a;         /* temple-gold accent */
    --teal: #3ec6a8;         /* digital layer green */
    --dim: rgba(242,239,230,.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--mist); -webkit-user-select: none; user-select: none; }

  #camera-feed { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: none; }
  #gl { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  /* ---- Landing overlay ---- */
  #landing { position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: flex-end; padding: 16px 24px 30px;
    background: linear-gradient(180deg, rgba(11,14,26,.2) 0%, rgba(11,14,26,.92) 70%);
    z-index: 10; }
  #hero-dragon { flex: 1; min-height: 0; width: 100%; margin-bottom: 4px;
    --poster-color: transparent; background: transparent; }
  .wordmark { font-size: 12px; letter-spacing: .42em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px; }
  #landing h1 { font-size: clamp(26px, 6vw, 38px); line-height: 1.05;
    font-weight: 650; letter-spacing: -0.01em; margin-bottom: 8px; }
  #landing h1 em { font-style: normal; color: var(--teal); }
  #landing p { font-size: 13px; line-height: 1.45; color: var(--dim);
    max-width: 46ch; margin-bottom: 16px; }
  .btn { display: block; width: 100%; padding: 12px; border: 0; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
    font-family: inherit; }
  .btn-primary { background: var(--gold); color: var(--ink); }
  .btn-ghost { background: transparent; color: var(--mist);
    border: 1px solid rgba(242,239,230,.28); }
  .btn:disabled { opacity: .4; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { font-size: 13px; padding: 11px 8px; }
  #xr-note { font-size: 11px; color: var(--dim); text-align: center; }

  /* ---- HUD ---- */
  #hud { position: absolute; inset: 0; z-index: 5; pointer-events: none;
    display: none; }
  #status { position: absolute; top: max(14px, env(safe-area-inset-top));
    left: 14px; right: 14px; display: flex; gap: 8px; align-items: center;
    font-size: 12px; }
  .pill { background: rgba(11,14,26,.66); backdrop-filter: blur(8px);
    border-radius: 999px; padding: 7px 13px; }
  .pill b { color: var(--teal); font-weight: 600; }
  #nearby { position: absolute; bottom: max(20px, env(safe-area-inset-bottom));
    left: 14px; right: 14px; display: flex; flex-direction: column; gap: 8px; }
  .anchor-card { background: rgba(11,14,26,.72); backdrop-filter: blur(8px);
    border-left: 3px solid var(--gold); border-radius: 10px; padding: 10px 14px;
    font-size: 13px; display: flex; justify-content: space-between; align-items: baseline; }
  .anchor-card .dist { color: var(--teal); font-variant-numeric: tabular-nums;
    font-size: 12px; white-space: nowrap; margin-left: 12px; }
  .anchor-card small { display: block; color: var(--dim); font-size: 11px; margin-top: 2px; }

  #toast { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(11,14,26,.85); border-radius: 12px; padding: 14px 20px;
    font-size: 14px; display: none; z-index: 20; text-align: center; max-width: 82vw; }

  /* ---- World map overlay ---- */
  #map-overlay { position: absolute; inset: 0; z-index: 30; display: none;
    flex-direction: column; background: var(--ink); }
  #map-topbar { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; padding-top: max(14px, env(safe-area-inset-top)); }
  #map-topbar .wordmark { margin-bottom: 0; }
  #btn-map-close { background: rgba(242,239,230,.1); color: var(--mist);
    border: 0; border-radius: 999px; width: 36px; height: 36px; font-size: 16px;
    cursor: pointer; }
  #map { flex: 1; }
  .leaflet-popup-content { font-family: inherit; }
  .anchor-label { background: rgba(11,14,26,.85); color: var(--mist); border: 0;
    border-radius: 6px; padding: 2px 7px; font-size: 11px; font-weight: 600;
    box-shadow: none; white-space: nowrap; }
  .leaflet-tooltip-top.anchor-label::before { border-top-color: rgba(11,14,26,.85); }
  .anchor-pop b { display: block; font-size: 14px; }
  .anchor-pop small { color: #666; }
  .pop-del { margin-top: 6px; background: #c33; color: #fff; border: 0;
    border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }

  /* ---- Creator panel ---- */
  #map-actions { display: flex; gap: 8px; padding: 0 14px 12px; }
  .chip { flex: 1; padding: 11px; border: 1px solid rgba(242,239,230,.25);
    background: rgba(242,239,230,.06); color: var(--mist); border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .chip.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }
  #creator-form { display: none; padding: 14px; background: rgba(242,239,230,.05);
    border-top: 1px solid rgba(242,239,230,.12); }
  #creator-form label { display: block; font-size: 12px; color: var(--dim); margin: 10px 0 4px; }
  #creator-form input, #creator-form select { width: 100%; padding: 11px;
    border-radius: 10px; border: 1px solid rgba(242,239,230,.25);
    background: var(--ink); color: var(--mist); font-size: 14px; font-family: inherit; }
  .swatches { display: flex; gap: 10px; margin-top: 4px; }
  .swatch { width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; }
  .swatch.active { border-color: var(--mist); }
  #creator-form .row { display: flex; gap: 8px; margin-top: 14px; }
  #creator-form .row .btn { margin-bottom: 0; padding: 13px; font-size: 14px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</head>
<body>
  <video id="camera-feed" autoplay muted playsinline></video>
  <canvas id="gl"></canvas>

  <div id="landing">
    <model-viewer id="hero-dragon" src="dragon.glb"
      autoplay auto-rotate rotation-per-second="12deg"
      camera-controls disable-pan interaction-prompt="none"
      camera-orbit="0deg 80deg 55%" min-camera-orbit="auto auto 25%" max-camera-orbit="auto auto 160%"
      shadow-intensity="0" exposure="1.1"
      alt="A dragon guarding the world's second layer"></model-viewer>
    <div class="wordmark">Mirage</div>
    <h1>The world has a <em>second layer</em>.</h1>
    <p>Point your device at the world around you and discover living 3D artifacts anchored to real places.</p>
    <button class="btn btn-primary" id="btn-phone">Enter with phone camera</button>
    <div class="btn-row">
      <button class="btn btn-ghost" id="btn-xr" disabled>Glasses / headset</button>
      <button class="btn btn-ghost" id="btn-map">View world map</button>
    </div>
    <div id="xr-note">Checking for WebXR device…</div>
  </div>

  <div id="map-overlay">
    <div id="map-topbar">
      <div class="wordmark">Mirage · world map</div>
      <button id="btn-map-close" aria-label="Close map">✕</button>
    </div>
    <div id="map-actions">
      <button class="chip" id="btn-add-mode">+ Add anchor</button>
      <button class="chip" id="btn-copy-json">Copy JSON</button>
    </div>
    <div id="map"></div>
    <div id="creator-form">
      <label for="cf-name">Name</label>
      <input id="cf-name" placeholder="My school portal" maxlength="40">
      <label for="cf-type">Type</label>
      <select id="cf-type">
        <option value="portal">Portal (glowing ring)</option>
        <option value="crystal">Crystal (floating gem)</option>
        <option value="beacon">Beacon (light column)</option>
        <option value="model">My own 3D model (.glb link)</option>
      </select>
      <div id="cf-model-row" style="display:none">
        <label for="cf-url">Model URL (.glb)</label>
        <input id="cf-url" placeholder="https://…/mymodel.glb">
      </div>
      <label>Color</label>
      <div class="swatches">
        <div class="swatch active" data-c="#3ec6a8" style="background:#3ec6a8"></div>
        <div class="swatch" data-c="#e8b44a" style="background:#e8b44a"></div>
        <div class="swatch" data-c="#7f77dd" style="background:#7f77dd"></div>
        <div class="swatch" data-c="#f0997b" style="background:#f0997b"></div>
        <div class="swatch" data-c="#ed93b1" style="background:#ed93b1"></div>
      </div>
      <div class="row">
        <button class="btn btn-primary" id="cf-save">Save anchor</button>
        <button class="btn btn-ghost" id="cf-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div id="hud">
    <div id="status">
      <div class="pill" id="gps-pill">GPS <b id="gps-acc">—</b></div>
      <div class="pill" id="heading-pill">Heading <b id="heading">—</b></div>
    </div>
    <div id="nearby"></div>
  </div>

  <div id="toast"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script>
    // ---- World map + creator mode ----
    const LKEY = "mirage-local-anchors";
    const getLocal = () => { try { return JSON.parse(localStorage.getItem(LKEY)) ?? []; } catch { return []; } };
    const setLocal = (a) => localStorage.setItem(LKEY, JSON.stringify(a));

    let worldMap = null, localLayer = null;
    let addMode = false, draftLatLng = null, draftMarker = null, pickedColor = "#3ec6a8";
    const overlay = document.getElementById("map-overlay");
    const form = document.getElementById("creator-form");
    const toastEl = document.getElementById("toast");

    function mapToast(msg, ms = 3500) {
      toastEl.textContent = msg;
      toastEl.style.display = "block";
      clearTimeout(mapToast._t);
      mapToast._t = setTimeout(() => (toastEl.style.display = "none"), ms);
    }

    function popupHtml(a, isLocal) {
      return `<div class="anchor-pop"><b>${a.name}</b>` +
        `<small>${a.type}${a.note ? " · " + a.note : ""}</small>` +
        (isLocal ? `<button class="pop-del" onclick="deleteLocalAnchor('${a.id}')">Delete</button>` : "") +
        `</div>`;
    }

    function drawLocalAnchors() {
      if (localLayer) localLayer.remove();
      localLayer = L.layerGroup().addTo(worldMap);
      for (const a of getLocal()) {
        L.circleMarker([a.lat, a.lng], {
          radius: 10, color: "#ffffff", weight: 2.5, dashArray: "4 4",
          fillColor: a.color || "#3ec6a8", fillOpacity: 0.95,
        }).addTo(localLayer)
          .bindPopup(popupHtml(a, true))
          .bindTooltip(a.name, { permanent: true, direction: "top", offset: [0, -10], className: "anchor-label" });
      }
    }

    window.deleteLocalAnchor = (id) => {
      setLocal(getLocal().filter((a) => a.id !== id));
      drawLocalAnchors();
      mapToast("Anchor deleted from this device");
    };

    document.getElementById("btn-map").addEventListener("click", async () => {
      overlay.style.display = "flex";
      if (worldMap) return;

      worldMap = L.map("map").setView([13.75, 100.5], 6);
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(worldMap);

      try {
        const wparam = new URLSearchParams(location.search).get("world");
        const wfile = wparam && /^[a-z0-9-]{1,40}$/.test(wparam) ? `${wparam}.json` : "world.json";
        const res = await fetch(wfile, { cache: "no-cache" });
        const data = await res.json();
        const pts = [];
        for (const a of data.anchors ?? []) {
          if (a.lat == null || a.lng == null) continue; // relative/showcase anchors have no fixed spot
          const color = a.color || "#3ec6a8";
          L.circleMarker([a.lat, a.lng], {
            radius: 10, color: "#ffffff", weight: 2.5, fillColor: color, fillOpacity: 0.95,
          }).addTo(worldMap)
            .bindPopup(popupHtml(a, false))
            .bindTooltip(a.name, { permanent: true, direction: "top", offset: [0, -10], className: "anchor-label" });
          pts.push([a.lat, a.lng]);
        }
        if (pts.length) worldMap.fitBounds(pts, { padding: [40, 40] });
      } catch (e) { console.error(e); }

      drawLocalAnchors();

      navigator.geolocation?.getCurrentPosition((pos) => {
        L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
          radius: 7, color: "#f2efe6", weight: 3, fillColor: "#f2efe6", fillOpacity: 0.9,
        }).addTo(worldMap).bindPopup("<b>You are here</b>");
      });

      worldMap.on("click", (e) => {
        if (!addMode) return;
        draftLatLng = e.latlng;
        if (draftMarker) draftMarker.remove();
        draftMarker = L.circleMarker(e.latlng, {
          radius: 11, color: pickedColor, weight: 3, dashArray: "2 4",
          fillColor: pickedColor, fillOpacity: 0.5,
        }).addTo(worldMap);
        form.style.display = "block";
        document.getElementById("cf-name").focus();
      });

      setTimeout(() => worldMap.invalidateSize(), 100);
    });

    document.getElementById("btn-map-close").addEventListener("click", () => {
      overlay.style.display = "none";
    });

    // Add mode toggle
    const addBtn = document.getElementById("btn-add-mode");
    addBtn.addEventListener("click", () => {
      addMode = !addMode;
      addBtn.classList.toggle("active", addMode);
      if (addMode) mapToast("Tap the map where your anchor should live");
      else { form.style.display = "none"; if (draftMarker) draftMarker.remove(); }
    });

    // Color swatches
    document.querySelectorAll(".swatch").forEach((s) => {
      s.addEventListener("click", () => {
        document.querySelectorAll(".swatch").forEach((x) => x.classList.remove("active"));
        s.classList.add("active");
        pickedColor = s.dataset.c;
        if (draftMarker) draftMarker.setStyle({ color: pickedColor, fillColor: pickedColor });
      });
    });

    // Show model URL field only for type=model
    document.getElementById("cf-type").addEventListener("change", (e) => {
      document.getElementById("cf-model-row").style.display =
        e.target.value === "model" ? "block" : "none";
    });

    // Save anchor to this device
    document.getElementById("cf-save").addEventListener("click", () => {
      if (!draftLatLng) { mapToast("Tap the map first to choose a spot"); return; }
      const name = document.getElementById("cf-name").value.trim() || "My anchor";
      const type = document.getElementById("cf-type").value;
      const anchor = {
        id: "local-" + Date.now(),
        name, type,
        lat: +draftLatLng.lat.toFixed(6),
        lng: +draftLatLng.lng.toFixed(6),
        color: pickedColor,
        note: "Created by me",
      };
      if (type === "model") {
        const url = document.getElementById("cf-url").value.trim();
        if (!url.endsWith(".glb")) { mapToast("Model needs a link ending in .glb"); return; }
        anchor.url = url; anchor.scale = 1;
      }
      setLocal([...getLocal(), anchor]);
      drawLocalAnchors();
      form.style.display = "none";
      if (draftMarker) draftMarker.remove();
      draftLatLng = null;
      addMode = false; addBtn.classList.remove("active");
      document.getElementById("cf-name").value = "";
      mapToast("Saved! It now appears in your AR on this device. Tap Copy JSON to publish it for everyone.", 5000);
    });

    document.getElementById("cf-cancel").addEventListener("click", () => {
      form.style.display = "none";
      if (draftMarker) draftMarker.remove();
      draftLatLng = null;
    });

    // Copy local anchors as JSON to paste into world.json on GitHub
    document.getElementById("btn-copy-json").addEventListener("click", async () => {
      const mine = getLocal();
      if (!mine.length) { mapToast("No anchors created yet — tap + Add anchor first"); return; }
      const cleaned = mine.map(({ id, ...rest }, i) => ({ id: "my-anchor-" + (i + 1), ...rest }));
      const text = JSON.stringify(cleaned, null, 2).replace(/^\[\n|\n\]$/g, "");
      try {
        await navigator.clipboard.writeText(text);
        mapToast("Copied! Paste it into the anchors list in world.json on GitHub (add a comma after the last one).", 6000);
      } catch {
        prompt("Copy this and paste into world.json:", text);
      }
    });

    if ("serviceWorker" in navigator) {
      addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
